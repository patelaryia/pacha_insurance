model_wrapper:
  max_attempts: 6
  max_elapsed_seconds: 600
  initial_backoff_seconds: 1
  max_backoff_seconds: 60
  fallback_after_attempt: 3
confidence_thresholds:
  money: '0.90'
  date: '0.90'
  registration: '0.90'
  other: '0.85'
classification_confidence_threshold: 0.80
vision_text_coverage_threshold: 0.05
# Page raster resolution for NORMALIZE. 300 is the extraction-quality value;
# lowering it is an extraction decision, not a CI one.
page_raster_dpi: 300
