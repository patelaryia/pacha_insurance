name: PostgreSQL full rehearsal

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  push:
    branches: [main]
  schedule:
    # 01:17 EAT; off the top of the hour to reduce hosted-runner queueing.
    - cron: "17 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postgres-full-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  test-postgres-full:
    name: tests (PostgreSQL full)
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci-full-postgres')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pacha
          POSTGRES_PASSWORD: pacha
          POSTGRES_DB: pacha_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pacha -d pacha_test" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install project dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Tests
        env:
          DATABASE_URL: postgresql+psycopg://pacha:pacha@localhost:5432/pacha_test
          REDIS_URL: redis://localhost:6379/0
        run: >-
          pytest -q -n 2 --dist=load --durations=30 -m "not real_ocr"
          --timeout=300 --timeout-method=thread
          --junitxml=reports/pytest-postgres-full.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-postgres-full
          path: reports/
          if-no-files-found: warn
