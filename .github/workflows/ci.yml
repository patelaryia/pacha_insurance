name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pacha
          POSTGRES_PASSWORD: pacha
          POSTGRES_DB: pacha_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pacha" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Tesseract OCR, PRD-01)
        run: sudo apt-get update -q && sudo apt-get install -y -q tesseract-ocr

      - name: Install tooling
        run: pip install ruff pytest pytest-cov

      - name: Install project dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Ruff lint
        run: ruff check .

      - name: ED-8 money-float lint
        run: python tools/ci/money_float_lint.py

      - name: AR-2 banned-call check
        run: python tools/ci/banned_calls.py

      - name: Tests (SQLite default)
        run: pytest -q

      - name: Tests (PostgreSQL 16, ED-3)
        env:
          DATABASE_URL: postgresql+psycopg://pacha:pacha@localhost:5432/pacha_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest -q

  console:
    name: console (PACKET-11, ED-7 vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install console dependencies
        working-directory: console
        run: npm ci

      - name: Build console (Vite)
        working-directory: console
        run: npm run build

      - name: Console tests (vitest, includes protected tests/acceptance/console)
        working-directory: console
        run: npm test -- --run --coverage
