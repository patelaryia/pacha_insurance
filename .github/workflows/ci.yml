name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Ruff and the two invariant guards are pure-AST and need neither the project
  # dependencies nor a database, so they must not queue behind the test suites.
  # A PR that breaks ED-8 or AR-2 now says so in seconds, not after both suites.
  lint:
    name: lint and invariant guards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tooling
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: ED-8 money-float lint
        run: python tools/ci/money_float_lint.py

      - name: AR-2 banned-call check
        run: python tools/ci/banned_calls.py

  test-sqlite:
    name: tests (SQLite default)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install project dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      # Two workers, not `-n auto`: a GitHub runner is 4 shared vCPU and the
      # gain flattens past two. Coverage is collected here only — the two
      # suites exercise the same code, so measuring both doubles the cost for
      # no extra signal.
      - name: Tests
        run: >-
          pytest -q -n 2 --durations=30 -m "not real_ocr"
          --timeout=300 --timeout-method=thread
          --junitxml=reports/pytest-sqlite.xml
          --cov --cov-report=term:skip-covered

      - name: ED-7a coverage boundaries
        run: |
          python -m coverage json -o reports/coverage.json
          python tools/ci/coverage_guard.py reports/coverage.json

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-sqlite
          path: reports/
          if-no-files-found: warn

  test-postgres:
    name: tests (PostgreSQL required)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pacha
          POSTGRES_PASSWORD: pacha
          POSTGRES_DB: pacha_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pacha -d pacha_test" --health-interval 5s
          --health-timeout 5s --health-retries 10
      # D-10: the suite expects Redis to be reachable on the PostgreSQL tier.
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install project dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      # Worker count is set from measurement, not assumption — see the PR body.
      # Each xdist worker now builds its own database (tests/conftest.py), so
      # parallelism is safe here; whether it is faster is a separate question.
      - name: Tests
        env:
          DATABASE_URL: postgresql+psycopg://pacha:pacha@localhost:5432/pacha_test
          REDIS_URL: redis://localhost:6379/0
        run: >-
          pytest -q -n 2 --dist=load --durations=30
          -m "postgres_required and not real_ocr"
          --timeout=300 --timeout-method=thread
          --junitxml=reports/pytest-postgres-required.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-postgres-required
          path: reports/
          if-no-files-found: warn

  # The only tests that drive the real binary. Everything else injects
  # `support.ocr.DeterministicOcrEngine`, and the two jobs above run without
  # Tesseract installed so a harness that forgets to inject fails there.
  ocr-smoke:
    name: ocr smoke (real Tesseract adapter)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies (Tesseract OCR, PRD-01)
        run: sudo apt-get update -q && sudo apt-get install -y -q tesseract-ocr

      # The marked tests skipif the binary is absent, so prove it is present
      # here — otherwise a broken install would read as a silent green job.
      - name: Verify the binary is present
        run: tesseract --version

      - name: Install project dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Tests
        run: pytest -q -m real_ocr

  console:
    name: console
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install console dependencies
        working-directory: console
        run: npm ci

      # `npm run build` already runs `npm run lint` (console/package.json), so a
      # separate lint step type-checks both tsconfigs a second time for nothing.
      - name: Console lint and production build
        working-directory: console
        run: npm run build

      - name: Console protected acceptance and coverage
        working-directory: console
        run: npm exec -- vitest run --config ../tests/acceptance/console/vitest.config.ts --coverage
