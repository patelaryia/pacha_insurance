version: 1
reject_reasons: pending_capture
types:
  FIELD_VERIFY:
    producing_events: [review.created]
    workspace_layout: field_verify
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: FIELD_VERIFY@1
    authorised_roles: &operational_roles
      [claims_officer, asst_claims_manager, claims_manager, gm, md, chairman]
    subtypes:
      coverage_manual:
        workspace_layout: coverage_checklist_card
        resolution_schema: FIELD_VERIFY_COVERAGE@1
  DOC_CLASSIFY:
    producing_events: [review.created]
    workspace_layout: document_classification
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: DOC_CLASSIFY@1
    authorised_roles: *operational_roles
  DOC_SPLIT:
    producing_events: [review.created]
    workspace_layout: document_split
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: DOC_SPLIT@1
    authorised_roles: *operational_roles
  CONSISTENCY_FLAG:
    producing_events: [review.created]
    workspace_layout: consistency_evidence
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: CONSISTENCY_FLAG@1
    authorised_roles: *operational_roles
  DRAFT_RELEASE:
    producing_events: [review.created]
    workspace_layout: draft_release
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: DRAFT_RELEASE@1
    authorised_roles: *operational_roles
    subtypes:
      # PACKET-21 §6/#279: one-click confirmation of an exact RPA launch. No
      # eighteenth review type is added; Edit->Approve changes only this row's
      # mode to paste-assist and Reject launches nothing.
      projection_rpa:
        workspace_layout: projection_rpa_release
        resolution_schema: DRAFT_RELEASE_PROJECTION@1
  MODE_CONFIRM:
    producing_events: [review.created]
    workspace_layout: mode_confirmation
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: MODE_CONFIRM@2
    authorised_roles: *operational_roles
  NOTE_REVIEW:
    producing_events: [review.created]
    workspace_layout: note_review
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: NOTE_REVIEW@1
    authorised_roles: *operational_roles
    subtypes:
      # PACKET-19 §4: NOTE_REVIEW@1 stays registered for historical replay; the
      # approval-note subtype signs an exact draft id and body hash.
      approval_note:
        workspace_layout: approval_note_review
        resolution_schema: NOTE_REVIEW@2
  PACK_REVIEW:
    producing_events: [review.created]
    workspace_layout: pack_review
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: PACK_REVIEW@1
    authorised_roles: &approval_roles
      [asst_claims_manager, claims_manager, gm, md, chairman]
    band_amount_path: assessment.agreed_quote
    subtypes:
      # PACKET-19 §5/#248: an approval pack is authorised against the immutable
      # routing snapshot in its payload, never against `assessment.agreed_quote`.
      # `band_amount_path: null` removes the wrong band input; `band_role_path`
      # names the payload key holding the one role that may see or resolve it.
      approval_pack:
        workspace_layout: approval_pack_review
        resolution_schema: PACK_REVIEW@2
        band_amount_path: null
        band_role_path: required_role
  EX_GRATIA:
    producing_events: [review.created]
    workspace_layout: ex_gratia_review
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: EX_GRATIA@1
    authorised_roles: *approval_roles
    band_amount_path: assessment.agreed_quote
  EXCEPTION:
    producing_events: [review.created]
    workspace_layout: exception_detail
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: EXCEPTION@1
    authorised_roles: *operational_roles
    subtypes:
      # PACKET-21 §10/#286: a divergence records exactly one disposition. No
      # disposition auto-corrects either side or reopens the old projection.
      divergence:
        workspace_layout: projection_divergence
        resolution_schema: EXCEPTION_DIVERGENCE@1
  PROMOTION_SIGNOFF:
    producing_events: [review.created]
    workspace_layout: promotion_signoff
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: PROMOTION_SIGNOFF@1
    authorised_roles: [claims_manager]
  SAMPLE_REVIEW:
    producing_events: [review.created]
    workspace_layout: sampled_output
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: SAMPLE_REVIEW@1
    authorised_roles: *operational_roles
  # PACKET-21 §12/#287: @1 stays registered for replay of historical resolved
  # items, but every new sample resolves against the opaque capture id in @2 so
  # observed target values never enter review history.
  PASTE_READBACK_CHECK:
    producing_events: [review.created]
    workspace_layout: paste_readback
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: PASTE_READBACK_CHECK@2
    authorised_roles: *operational_roles
  PROCEED_PARTIAL:
    producing_events: [review.created]
    workspace_layout: partial_documents
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: PROCEED_PARTIAL@1
    authorised_roles: *operational_roles
  KYC_VERIFY:
    producing_events: [review.created]
    workspace_layout: kyc_verification
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: KYC_VERIFY@1
    authorised_roles: *operational_roles
  EFT_MATCH:
    producing_events: [review.created]
    workspace_layout: eft_match
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: EFT_MATCH@1
    authorised_roles: [claims_manager, finance]
  REOPEN_PROMPT:
    producing_events: [review.created]
    workspace_layout: reopen_prompt
    resolution_actions: [approve, edit_approve, reject]
    resolution_schema: REOPEN_PROMPT@1
    authorised_roles: *operational_roles
