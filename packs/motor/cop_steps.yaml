version: 1
step_definitions:
  - capability_id: intake.claim_creation
    steps:
      - {id: create_claim, expects_events: [intake.requested], produces: [claim.created]}
      - {id: ingest, expects_events: [claim.created], produces: [document.received]}
      - {id: populate, expects_events: [document.extracted], produces: [field.updated]}
      - {id: dupe_check, expects_events: [field.updated], produces: [review.created]}
      - {id: late_check, expects_events: [field.updated], produces: [rule.evaluated]}
      - {id: acknowledge, expects_events: [rule.evaluated], produces: [review.created]}
      - {id: checklist, expects_events: [review.created], produces: [chase.init]}
      - {id: triage, expects_events: [chase.init], produces: [rule.evaluated]}
  - capability_id: assessment.mode_shadow
    steps:
      - {id: call_model, expects_events: [assessment.mode_item_created], produces: [model.called]}
  - capability_id: pack.merge
    steps:
      - {id: resolve_manifest, expects_events: [pack.merge_requested], produces: [pack.merged]}
  - capability_id: pack.note_draft
    steps:
      - {id: generate_commentary, expects_events: [pack.merged], produces: [model.called]}
      - {id: grade_and_queue, expects_events: [model.called], produces: [pack.note_drafted]}
