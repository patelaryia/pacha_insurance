version: 1
step_definitions:
  - capability_id: intake.claim_creation
    steps:
      - {id: create_claim, expects_events: [intake.requested], produces: [claim.created]}
      - {id: ingest, expects_events: [claim.created], produces: [document.received]}
      - {id: populate, expects_events: [document.extracted], produces: [field.updated]}
      - {id: dupe_check, expects_events: [field.updated], produces: [review.created]}
      - {id: late_check, expects_events: [field.updated], produces: [rule.evaluated]}
      - {id: acknowledge, expects_events: [rule.evaluated], produces: [review.created]}
      - {id: checklist, expects_events: [review.created], produces: [chase.init]}
      - {id: triage, expects_events: [chase.init], produces: [rule.evaluated]}
  - capability_id: assessment.mode_shadow
    steps:
      - {id: call_model, expects_events: [assessment.mode_item_created], produces: [model.called]}
  - capability_id: pack.merge
    steps:
      - {id: resolve_manifest, expects_events: [pack.merge_requested], produces: [pack.merged]}
  - capability_id: pack.note_draft
    steps:
      - {id: generate_commentary, expects_events: [pack.merged], produces: [model.called]}
      - {id: grade_and_queue, expects_events: [model.called], produces: [pack.note_drafted]}

  # PACKET-21 §6: one exact projection COP definition per canonical `project.*`
  # capability. These are stable stage ids only — target-form step detail stays
  # in `projections.evidence`, and G-PROC checks just this coarse sequence.
  - capability_id: project.icon.policy_read
    steps: &projection_stages
      - {id: authorise, expects_events: [projection.requested], produces: [review.created]}
      - {id: lease, expects_events: [review.resolved], produces: []}
      - {id: execute, expects_events: [], produces: []}
      - {id: readback, expects_events: [], produces: []}
      - {id: reconcile, expects_events: [], produces: [projection.completed]}
  - capability_id: project.icon.claim_register
    steps: *projection_stages
  - capability_id: project.icon.reserve_create
    steps: *projection_stages
  - capability_id: project.icon.reserve_breakdown
    steps: *projection_stages
  - capability_id: project.icon.reserve_adjust
    steps: *projection_stages
  - capability_id: project.icon.assessor_payment_request
    steps: *projection_stages
  - capability_id: project.icon.note_entry
    steps: *projection_stages
  - capability_id: project.icon.claim_details_report
    steps: *projection_stages
  - capability_id: project.icon.salvage_register
    steps: *projection_stages
  - capability_id: project.icon.payment_voucher
    steps: *projection_stages
  - capability_id: project.edms.general_payments
    steps: *projection_stages
  - capability_id: project.edms.claims_workflow
    steps: *projection_stages
  - capability_id: project.edms.attach_and_tag
    steps: *projection_stages
  - capability_id: project.edms.claim_payment
    steps: *projection_stages
  - capability_id: project.edms.payment_workflow
    steps: *projection_stages
