version: 1
self_addresses: []
archive_sample_rate: 10
checklist_base_items:
  - claim_form
  - logbook_copy
  - dl_copy
  - kra_pin
  - police_abstract
  - repair_estimate
  - photos
checklist_doc_types:
  claim_form: [claim_form]
  logbook_copy: [logbook]
  dl_copy: [driving_licence]
  kra_pin: [kra_pin_cert]
  police_abstract: [police_abstract]
  repair_estimate: [repair_estimate]
  photos: [photo_damage]
money_relevant_doc_types: pending_capture
classifier:
  tier: MODEL_LIGHT
  purpose: mailbox triage
  max_cost_usd: 0.02
  thresholds:
    new_intimation: 0.85
    not_a_claim: 0.95
  prompt: >-
    Classify one shared-mailbox message into exactly one of new_intimation,
    multi_intimation, claim_related_unmatched, not_a_claim, or unclear. Return
    only the structured class and confidence. Never infer a claim reference.
