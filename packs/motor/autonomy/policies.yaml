default_policy:
  l1_l2_items: 25
  l1_l2_grader_pass_percent: 96
  l2_l3_items: 50
  l2_l3_pass_percent: 98
  l3_l4_items: 100
  l3_l4_pass_percent: 99
  l3_l4_zero_critical_days: 60
  sampling_rate: 20
  sampling_floor: 5
  demotion_items: 20
  demotion_pass_percent: 95

capabilities:
  - {id: intake.mailbox_triage, max_level: L4, initial_level: L1, policy: {}}
  - {id: intake.claim_creation, max_level: L4, initial_level: L2, policy: {}}
  - {id: intake.acknowledge, max_level: L4, initial_level: L1, policy: {}}
  - {id: intake.doc_request, max_level: L4, initial_level: L1, policy: {}}
  - {id: triage.coverage_check, max_level: L3, initial_level: L1, policy: {}}
  - {id: triage.decline_draft, max_level: L2, initial_level: L1, policy: {}}
  - {id: triage.ex_gratia, max_level: L1, initial_level: L1, policy: {}}
  - {id: assessment.mode_confirm, max_level: L2, initial_level: L2, policy: {}}
  - {id: assessment.dispatch, max_level: L3, initial_level: L1, policy: {}}
  - {id: assessment.mode_shadow, max_level: L0, initial_level: L0, policy: {}}
  - {id: assessment.consistency_flag, max_level: L2, policy: {}}
  # PRD-08: merge and note each cross their own gate. pack.note_draft is capped
  # at L3 by the constitution — drafting and queueing only; signature is human.
  # pack.route is configuration-only until PACKET-19; approval authority is not
  # a capability and is never routed through it.
  - {id: pack.merge, max_level: L4, initial_level: L1, policy: {}}
  - {id: pack.note_draft, max_level: L3, initial_level: L1, policy: {}}
  - {id: pack.route, max_level: L4, initial_level: L1, policy: {}}
  - {id: chase.checklist, max_level: L4, policy: {}}
  - {id: chase.reminder, max_level: L4, initial_level: L1, policy: {}}
  - {id: chase.rerequest, max_level: L4, initial_level: L1, policy: {}}
  - {id: repair.authorize, max_level: L3, policy: {}}
  - {id: repair.invoice_match, max_level: L4, policy: {}}
  - {id: repair.completion_detect, max_level: L4, policy: {}}
  - {id: salvage.register, max_level: L3, policy: {}}
  - {id: salvage.publish, max_level: L3, policy: {}}
  - {id: salvage.close_and_rank, max_level: L3, policy: {}}
  - {id: settlement.eft_match, max_level: L3, initial_level: L0, policy: {}}
  # PRD-09 §9.6 / register #262: capability ids are `project.<operation>`. The six
  # provisional bare `icon.*`/`edms.*` seeds from PACKET-08 are retired here; an
  # existing database carrying durable evidence for one of them fails startup with
  # LEGACY_PROJECTION_CAPABILITY_IN_USE instead of being rewritten.
  #
  # Paste-assist launches at L1 because the officer performs the target write.
  # PRD-11/PRD-12-owned rows stay L0 until their owner packet. Ceilings mirror the
  # register #273 constitution in eval_harness/policies.py and only tighten it.
  - {id: project.icon.policy_read, max_level: L4, initial_level: L1, policy: {}}
  - {id: project.icon.claim_register, max_level: L4, initial_level: L1, policy: {}}
  - {id: project.icon.reserve_create, max_level: L3, initial_level: L1, policy: {}}
  - {id: project.icon.reserve_breakdown, max_level: L3, initial_level: L1, policy: {}}
  - {id: project.icon.reserve_adjust, max_level: L3, initial_level: L1, policy: {}}
  - {id: project.icon.assessor_payment_request, max_level: L3, initial_level: L1, policy: {}}
  - {id: project.icon.note_entry, max_level: L4, initial_level: L1, policy: {}}
  - {id: project.icon.claim_details_report, max_level: L4, initial_level: L1, policy: {}}
  - {id: project.icon.salvage_register, max_level: L3, initial_level: L0, policy: {}}
  - {id: project.icon.payment_voucher, max_level: L2, initial_level: L0, policy: {}}
  - {id: project.edms.general_payments, max_level: L3, initial_level: L1, policy: {}}
  - {id: project.edms.claims_workflow, max_level: L4, initial_level: L1, policy: {}}
  - {id: project.edms.attach_and_tag, max_level: L4, initial_level: L1, policy: {}}
  - {id: project.edms.claim_payment, max_level: L2, initial_level: L0, policy: {}}
  - {id: project.edms.payment_workflow, max_level: L2, initial_level: L0, policy: {}}
