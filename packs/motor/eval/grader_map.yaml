# ED-7 grader coverage registration: every graded output type names at least one
# `critical` grader from the closed nine-grader registry. No grader id is
# invented here; this file only records which existing grader owns which output.
version: 1

output_types:
  extracted_field:
    graders:
      - {id: G-VAL, severity: critical}
      - {id: G-CITE, severity: critical}

  # PRD-09 §9.5 / PACKET-20: an ICON or EDMS readback committed as
  # `source_type=projection_readback` is graded against the captured click-path
  # validator by the same critical G-VAL, before it can count as autonomy
  # evidence for a `project.*` capability.
  projection_readback:
    graders:
      - {id: G-VAL, severity: critical}
    field_paths:
      - external.icon.claim_no
      - external.icon.salvage_no
      - external.edms.folder_ref

  # PACKET-21 §16: every completed RPA run is graded twice — the reconciliation
  # itself by the same critical G-VAL, and the coarse COP stage sequence by the
  # major G-PROC. No tenth grader id is invented for either.
  projection_execution:
    graders:
      - {id: G-VAL, severity: critical}
      - {id: G-PROC, severity: major}
    capability_prefix: project.

  calc_run:
    graders:
      - {id: G-CALC, severity: critical}
      - {id: G-SUM, severity: critical}

  rule_run:
    graders:
      - {id: G-RULE, severity: critical}

  rendered_template:
    graders:
      - {id: G-TPL, severity: critical}

  outbound_communication:
    graders:
      - {id: G-COMM, severity: critical}

  approval_note:
    graders:
      - {id: G-NOTE, severity: major}
      - {id: G-TPL, severity: critical}

  agent_procedure:
    graders:
      - {id: G-PROC, severity: major}
